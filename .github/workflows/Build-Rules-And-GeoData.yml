name: Build Rules And GeoData
on:
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * *"
#  push:
#    branches:
#      - main
#    paths-ignore:
#      - ".gitignore"
#      - "LICENSE"
#      - "*.md"

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "update_version=$(date -d '+8 hours' +%Y-%m-%d)" >> ${GITHUB_ENV}
          echo "domains_download_url=https://github.com/cnfind/geo-domain/releases/download/domains" >> ${GITHUB_ENV}
          echo "ips_download_url=https://github.com/cnfind/geo-dat/releases/download/ips" >> ${GITHUB_ENV}
        shell: bash

      - name: Clone Repository
        uses: actions/checkout@v6

      - name: Checkout `cnfind/geo-domain`
        uses: actions/checkout@v6
        with:
          repository: cnfind/geo-domain
          path: custom

      - name: Checkout `v2fly/domain-list-community`
        uses: actions/checkout@v6
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./custom/go.mod
          cache-dependency-path: ./custom/go.sum

      - name: Generate `mihomo` geodata
        run: |
          mkdir -p ./tmp/ ./community/mydata/
          archs1=(ads private tracker microsoft-cn apple-cn apple google-cn games-cn games netflix disney max primevideo spotify appletv youtube tiktok bilibili ai media speedtest tld-proxy gfw proxy tld-cn cn)
          archs2=(ads private tracker microsoft-cn apple-cn apple google-cn games-cn games appletv youtube tiktok ai media speedtest tld-proxy gfw proxy tld-cn cn)
          archs3=(private microsoft-cn apple-cn apple google-cn games-cn appletv youtube tiktok ai media speedtest gfw cn-lite)

          # Ready for `fakeip` and `fakeip-lite`
          curl -sSL "${domains_download_url}/fakeip.list" | awk '!/(DOMAIN-REGEX,|ntp|stun|time)/' | sed -e 's/DOMAIN,/full:/' -e 's/DOMAIN-SUFFIX,//' > ./tmp/temp-fakeip.txt
          cat <<EOF >> ./tmp/temp-fakeip.txt
          keyword:ntp
          keyword:stun
          keyword:time
          EOF
          curl -sSL "${domains_download_url}/fakeip.list" | awk '/DOMAIN-REGEX,/ && !/(ntp|stun|time)/' | sed 's/DOMAIN-REGEX,/regexp:/' >> ./tmp/temp-fakeip.txt
          sort --ignore-case ./tmp/temp-fakeip.txt > ./tmp/fakeip.txt

          curl -sSL "${domains_download_url}/fakeip-lite.list" | awk '!/(DOMAIN-REGEX,|ntp|stun|time)/' | sed -e 's/DOMAIN,/full:/' -e 's/DOMAIN-SUFFIX,//' > ./tmp/temp-fakeip-lite.txt
          cat <<EOF >> ./tmp/temp-fakeip-lite.txt
          keyword:ntp
          keyword:stun
          keyword:time
          EOF
          sort --ignore-case ./tmp/temp-fakeip-lite.txt > ./tmp/fakeip-lite.txt

          # Generate `mihomo` geosite-all.dat
          cd ./community/
          for arch1 in "${archs1[@]}"; do
            curl -sSL "${domains_download_url}/${arch1}.list" | sed -e 's/DOMAIN,/full:/' -e 's/DOMAIN-SUFFIX,//' -e 's/DOMAIN-KEYWORD,/keyword:/' -e 's/DOMAIN-REGEX,/regexp:/' > "./mydata/${arch1}"
          done
          cp -f ../tmp/fakeip.txt ./mydata/fakeip
          go run ./ --datapath=./mydata/ --outputname geosite-all.dat

          # Generate `mihomo` geosite.dat
          rm -f ./mydata/*
          for arch2 in "${archs2[@]}"; do
            curl -sSL "${domains_download_url}/${arch2}.list" | sed -e 's/DOMAIN,/full:/' -e 's/DOMAIN-SUFFIX,//' -e 's/DOMAIN-KEYWORD,/keyword:/' -e 's/DOMAIN-REGEX,/regexp:/' > "./mydata/${arch2}"
          done
          cp -f ../tmp/fakeip.txt ./mydata/fakeip
          go run ./ --datapath=./mydata/ --outputname geosite.dat

          # Generate `mihomo` geosite-lite.dat
          rm -f ./mydata/*
          for arch3 in "${archs3[@]}"; do
            curl -sSL "${domains_download_url}/${arch3}.list" | sed -e 's/DOMAIN,/full:/' -e 's/DOMAIN-SUFFIX,//' -e 's/DOMAIN-KEYWORD,/keyword:/' -e 's/DOMAIN-REGEX,/regexp:/' > "./mydata/${arch3}"
          done
          cp -f ../tmp/fakeip-lite.txt ./mydata/fakeip-lite
          mv -f ./mydata/cn-lite ./mydata/cn
          go run ./ --datapath=./mydata/ --outputname geosite-lite.dat

      - name: Get geoip relative files
        run: |
          mkdir -p ./mihomo/
          # Download mihomo geoip files (.mmdb)
          mihomo_mmdb=($(curl -sSL https://api.github.com/repos/cnfind/geo-dat/releases | awk '/"browser_download_url"/' | awk '/.mmdb/' | awk -F '"' '{print $4}'))
          count_mihomo_mmdb=${#mihomo_mmdb[@]}
          for ((i = 0; i < count_mihomo_mmdb; i++)); do
            wget -q -P ./mihomo/ "${mihomo_mmdb[i]}"
          done

          # Download `mihomo` other geoip files (except .mmdb)
          mihomo_others=($(curl -sSL https://api.github.com/repos/cnfind/geo-dat/releases | awk '/"browser_download_url"/' | awk '/\/mihomo\//' | awk '!/\.mmdb/' | awk -F '"' '{print $4}'))
          count_mihomo_others=${#mihomo_others[@]}
          for ((i = 0; i < count_mihomo_others; i++)); do
            wget -q -P ./community/ "${mihomo_others[i]}"
          done

      - name: Move `mihomo` geodata files
        run: |
          cd ./community/ || exit 1
          for file in $(ls *.dat *.metadb); do
            install -Dp "./${file}" ../mihomo/
          done
          rm -rf ../custom* ../community*

      - name: Download `mihomo` rule-set files
        run: |
          mkdir -p ./mihomo-ruleset/
          domains=(ads tracker microsoft-cn apple-cn apple google-cn games-cn games netflix disney max primevideo spotify appletv youtube tiktok bilibili ai media speedtest tld-proxy gfw proxy tld-cn cn cn-lite)
          ips=(privateip cnip cloudflareip telegramip netflixip mediaip)

          for domain in "${domains[@]}"; do
            mkdir -p "./tools/domains/${domain}/"
            curl -sSL "${domains_download_url}/${domain}.list" | awk '/(DOMAIN,|DOMAIN-SUFFIX,)/' | sed -e 's/DOMAIN,//' -e 's/DOMAIN-SUFFIX,/\+\./' >> "./tools/domains/${domain}/${domain}.list"
          done

          mkdir -p ./tools/domains/fakeip/
          curl -sSL "${domains_download_url}/fakeip.list" | awk '!/DOMAIN-REGEX,/' | sed -e 's/DOMAIN,//' -e 's/DOMAIN-SUFFIX,/\+\./' > ./tmp/temp-fakeip-domains.txt
          curl -sSL "${domains_download_url}/fakeip.list" | awk '/DOMAIN-REGEX,/' | sed -e 's/\\s/ /' -e 's/\\./\./g' -e 's/\[\^.\]+/*/g' -e 's/\^\.\*/\^\+/' -e 's/.*\^//; s/\$//' >> ./tmp/temp-fakeip-domains.txt
          sort --ignore-case ./tmp/temp-fakeip-domains.txt >> ./tools/domains/fakeip/fakeip.list

          mkdir -p ./tools/domains/fakeip-lite/
          curl -sSL "${domains_download_url}/fakeip-lite.list" | awk '!/DOMAIN-REGEX,/' | sed -e 's/DOMAIN,//' -e 's/DOMAIN-SUFFIX,/\+\./' > ./tmp/temp-fakeip-lite-domains.txt
          curl -sSL "${domains_download_url}/fakeip-lite.list" | awk '/DOMAIN-REGEX,/' | sed -e 's/\\./\./g' -e 's/\[\^.\]+/*/g' -e 's/\^\.\*/\^\+/' -e 's/.*\^//; s/\$//' >> ./tmp/temp-fakeip-lite-domains.txt
          sort --ignore-case ./tmp/temp-fakeip-lite-domains.txt >> ./tools/domains/fakeip-lite/fakeip-lite.list

          mkdir -p ./tools/domains/private/
          curl -sSL "${domains_download_url}/private.list" | awk '/(DOMAIN,|DOMAIN-SUFFIX,)/' | sed -e 's/DOMAIN,//' -e 's/DOMAIN-SUFFIX,/\+\./' > ./tmp/temp-private-domains.txt
          curl -sSL "${domains_download_url}/private.list" | awk '/DOMAIN-REGEX,/' | sed -e 's/\\./\./g' -e 's/\[\^.\]+/*/g' -e 's/\^\.\*/\^\+/' -e 's/.*\^//; s/\$//' >> ./tmp/temp-private-domains.txt
          sort --ignore-case ./tmp/temp-private-domains.txt >> ./tools/domains/private/private.list
          rm -f ./tmp/*

          curl -sSL "${domains_download_url}/applications.list" > ./mihomo-ruleset/applications.list

          for ip in "${ips[@]}"; do
            mkdir -p "./tools/ips/${ip}/"
            curl -sSL "${ips_download_url}/${ip}.list" | sed 's/.*,//' >> "./tools/ips/${ip}/${ip}.list"
          done

      - name: Generate `mihomo` rule-set (mrs) and move .list files
        run: |
          curl -sS -o ./tools/mihomo -L https://github.com/DustinWin/proxy-tools/releases/download/mihomo/mihomo-meta-linux-amd64-v3.upx
          chmod +x ./tools/mihomo

          cd ./tools/
          chmod +x ./mihomo
          list=($(ls ./domains/))
          for ((i = 0; i < ${#list[@]}; i++)); do
            ./mihomo convert-ruleset domain text "./domains/${list[i]}/${list[i]}.list" ../mihomo-ruleset/${list[i]}.mrs
            mv -f "./domains/${list[i]}/${list[i]}.list" ../mihomo-ruleset/
          done

          list=($(ls ./ips/))
          for ((i = 0; i < ${#list[@]}; i++)); do
            ./mihomo convert-ruleset ipcidr text "./ips/${list[i]}/${list[i]}.list" ../mihomo-ruleset/${list[i]}.mrs
            mv -f "./ips/${list[i]}/${list[i]}.list" ../mihomo-ruleset/
          done
          rm -rf ./mihomo* ./domains/ ./ips/

      - name: Download `loon` rule-set files
        run: |
          mkdir -p ./loon-ruleset/
          domains=(ads tracker microsoft-cn apple-cn apple google-cn games-cn games netflix disney max primevideo spotify appletv youtube tiktok bilibili ai media speedtest tld-proxy gfw proxy tld-cn cn cn-lite)
          ips=(privateip cnip cloudflareip telegramip netflixip mediaip)

          for domain in "${domains[@]}"; do
            mkdir -p "./tools/domains/${domain}/"
            curl -sSL "${domains_download_url}/${domain}.list" | sed -e '/^DOMAIN-REGEX,/d' -e '/^PROCESS-NAME,/d' -e 's/^\.//' >> "./tools/domains/${domain}/${domain}.list"
          done

          mkdir -p ./tools/domains/fakeip/
          curl -sSL "${domains_download_url}/fakeip.list" | sed -e '/^DOMAIN-REGEX,/d' -e '/^PROCESS-NAME,/d' -e 's/^\.//' > ./tmp/temp-fakeip-domains.txt
          sort --ignore-case ./tmp/temp-fakeip-domains.txt >> ./tools/domains/fakeip/fakeip.list

          mkdir -p ./tools/domains/fakeip-lite/
          curl -sSL "${domains_download_url}/fakeip-lite.list" | sed -e '/^DOMAIN-REGEX,/d' -e '/^PROCESS-NAME,/d' -e 's/^\.//' > ./tmp/temp-fakeip-lite-domains.txt
          sort --ignore-case ./tmp/temp-fakeip-lite-domains.txt >> ./tools/domains/fakeip-lite/fakeip-lite.list

          mkdir -p ./tools/domains/private/
          curl -sSL "${domains_download_url}/private.list" | sed -e '/^DOMAIN-REGEX,/d' -e '/^PROCESS-NAME,/d' -e 's/^\.//' > ./tmp/temp-private-domains.txt
          sort --ignore-case ./tmp/temp-private-domains.txt >> ./tools/domains/private/private.list
          rm -f ./tmp/*

          curl -sSL "${domains_download_url}/applications.list" | sed -e '/^DOMAIN-REGEX,/d' -e '/^PROCESS-NAME,/d' -e 's/^\.//' > ./loon-ruleset/applications.list

          for ip in "${ips[@]}"; do
            mkdir -p "./tools/ips/${ip}/"
            curl -sSL "${ips_download_url}/${ip}.list" | sed -e '/^IP-ASN,/d' -e 's/^\.//' >> "./tools/ips/${ip}/${ip}.list"
          done

      - name: Generate `loon` rule-set and move .list files
        run: |
          cd ./tools/
          list=($(ls ./domains/))
          for ((i = 0; i < ${#list[@]}; i++)); do
            mv -f "./domains/${list[i]}/${list[i]}.list" ../loon-ruleset/
          done

          list=($(ls ./ips/))
          for ((i = 0; i < ${#list[@]}; i++)); do
            mv -f "./ips/${list[i]}/${list[i]}.list" ../loon-ruleset/
          done
          rm -rf ./domains/ ./ips/

      - name: Generate sha256 checksum for dat files
        run: |
          cd ./mihomo/ || exit 1
          for name in $(ls *.dat); do
            sha256sum ${name} > ./${name}.sha256sum
          done

      - name: Generate sha256 checksum for mmdb files
        run: |
          cd ./mihomo/ || exit 1
          for name in $(ls *.mmdb); do
            sha256sum ${name} > ./${name}.sha256sum
          done

      - name: Generate sha256 checksum for metadb files
        run: |
          cd ./mihomo/ || exit 1
          for name in $(ls *.metadb); do
            sha256sum ${name} > ./${name}.sha256sum
          done

      - name: Release and upload `mihomo` assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: mihomo
          tag: mihomo
          overwrite: true
          body: |
            File Purpose: Mihomo kernel geodata file
            Updated Date：${{ env.update_version }}
          file_glob: true
          file: ./mihomo/*

      - name: Commit and push `mihomo` branch
        run: |
          cd ./mihomo/ || exit 1
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b mihomo
          git add . && git commit -m "geodata updated on ${update_version}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin mihomo

      - name: Release and upload `mihomo-ruleset` assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: mihomo-ruleset
          tag: mihomo-ruleset
          overwrite: true
          body: |
            File Purpose: Mihomo kernel rule-set file
            Updated Date：${{ env.update_version }}
          file_glob: true
          file: ./mihomo-ruleset/*

      - name: Commit and push `mihomo-ruleset` branch
        run: |
          cd ./mihomo-ruleset/ || exit 1
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b mihomo-ruleset
          git add . && git commit -m "ruleset updated on ${update_version}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin mihomo-ruleset

      - name: Release and upload `loon-ruleset` assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: loon-ruleset
          tag: loon-ruleset
          overwrite: true
          body: |
            File Purpose: Loon rule-set file
            Updated Date：${{ env.update_version }}
          file_glob: true
          file: ./loon-ruleset/*

      - name: Commit and push `loon-ruleset` branch
        run: |
          cd ./loon-ruleset/ || exit 1
          git init
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b loon-ruleset
          git add . && git commit -m "ruleset updated on ${update_version}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin loon-ruleset

      - name: Purge jsDelivr CDN
        run: |
          cd ./mihomo/ || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@mihomo/${file}"
          done
          cd ../mihomo-ruleset/ || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@mihomo-ruleset/${file}"
          done
          cd ../loon-ruleset/ || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@loon-ruleset/${file}"
          done

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 1
